# docker-compose.yml

name: docscope

services:

  api:
    build: ./api
    container_name: docscope_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    command: uvicorn docscope.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./api/src:/app/src
      - ./tests:/app/tests
      - ${DOCUMENTS_DIR}:/data/documents:ro
      - ./api/data:/app/data
    env_file:
      - .env
    networks:
      - docscope_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  client:
    build: ./client
    container_name: docscope_client
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./client/src:/usr/share/nginx/html
    networks:
      - docscope_network

networks:
  docscope_network:
    name: docscope_network
    driver: bridge

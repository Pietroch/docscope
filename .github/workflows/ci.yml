# .github/workflows/ci.yml

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: api/pyproject.toml

      - name: Install package
        working-directory: ./api
        run: pip install -e ".[dev]"

      - name: Lint
        working-directory: ./api
        run: ruff check .

      - name: Test
        env:
          # No docker volume on the runner - /app/data (the .env.example
          # default) doesn't exist here, so create_tables() (called at
          # import time in main.py) needs a writable path instead.
          DB_PATH: ${{ runner.temp }}/docscope-test.db
        run: pytest tests

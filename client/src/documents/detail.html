<!-- client/src/documents/detail.html -->

<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>docscope — document</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 700px;
            margin: 2rem auto;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 0.5rem;
            text-align: left;
        }

        th {
            width: 12rem;
        }

        #champs {
            margin-top: 1.5rem;
        }

        #champs td.editable {
            cursor: pointer;
        }

        #champs.locked td.editable {
            cursor: default;
        }

        #champs input {
            width: 100%;
            box-sizing: border-box;
            font: inherit;
        }

        .vue-toggle {
            margin-top: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 2.5rem;
            height: 1.4rem;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .switch .slider {
            position: absolute;
            inset: 0;
            background: #ccc;
            border-radius: 1.4rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .switch .slider::before {
            content: "";
            position: absolute;
            width: 1.1rem;
            height: 1.1rem;
            left: 0.15rem;
            bottom: 0.15rem;
            background: white;
            border-radius: 50%;
            transition: 0.2s;
        }

        .switch input:checked+.slider {
            background: #666;
        }

        .switch input:checked+.slider::before {
            transform: translateX(1.1rem);
        }

        .switch input:disabled+.slider {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Vue graphique : page dédiée par modèle, chargée en iframe
           (voir GRAPHIQUES ci-dessous). */
        #champs-graphique {
            margin-top: 1.5rem;
            width: 100%;
            min-height: 500px;
            border: 1px solid #ccc;
        }
    </style>
</head>

<body>
    <a href="list.html">&larr; Liste des documents</a>
    <h1>docscope — document</h1>

    <table id="document"></table>

    <div class="vue-toggle">
        <label class="switch">
            <input type="checkbox" id="valide-toggle">
            <span class="slider"></span>
        </label>
        <span>Document validé (verrouille les champs)</span>
    </div>

    <div class="vue-toggle">
        <label class="switch">
            <input type="checkbox" id="vue-graphique-toggle">
            <span class="slider"></span>
        </label>
        <span>Vue graphique</span>
    </div>

    <table id="champs">
        <thead>
            <tr>
                <th>Intitulé</th>
                <th>Valeur</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <button type="button" id="ajouter-champ">+ Ajouter un champ</button>

    <iframe id="champs-graphique" hidden></iframe>

    <script>
        const documentId = new URLSearchParams(location.search).get("id");
        const table = document.getElementById("document");
        const champsTable = document.getElementById("champs");
        const champsBody = document.querySelector("#champs tbody");
        const champsGraphique = document.getElementById("champs-graphique");
        const vueToggle = document.getElementById("vue-graphique-toggle");
        const ajouterChampBtn = document.getElementById("ajouter-champ");
        const valideToggle = document.getElementById("valide-toggle");

        // One dedicated graphique page per model - only apside exists so
        // far. Add an entry here as each new model gets its own view.
        const GRAPHIQUES = {
            apside: "graphique-apside.html",
        };
        let graphiqueUrl = null;

        // Validated documents are locked against edits (see
        // DocumentLocked/409 on the API side) - reflected here so clicking
        // a field or the add button silently does nothing while locked.
        let locked = false;

        const appliquerVerrouillage = () => {
            champsTable.classList.toggle("locked", locked);
            ajouterChampBtn.disabled = locked;
        };

        valideToggle.addEventListener("change", async () => {
            const next = valideToggle.checked;
            const response = await fetch(`http://localhost:8000/documents/${documentId}/validated`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ validated: next }),
            });
            const data = await response.json();
            if (!response.ok) {
                valideToggle.checked = !next;
                alert(data.detail);
                return;
            }
            locked = data.validated;
            appliquerVerrouillage();
        });

        vueToggle.addEventListener("change", () => {
            champsTable.hidden = vueToggle.checked;
            ajouterChampBtn.hidden = vueToggle.checked;
            champsGraphique.hidden = !vueToggle.checked;
            // Reload every time so edits made in the table since the last
            // switch are reflected immediately (cache-bust: same URL
            // wouldn't reload the iframe).
            if (vueToggle.checked) {
                champsGraphique.src = `${graphiqueUrl}?id=${documentId}&t=${Date.now()}`;
            }
        });

        // POST (field.id still null - freshly added row) or PATCH (existing
        // field) depending on whether the field has been persisted yet.
        const enregistrerChamp = async (field, label, value) => {
            const isNew = field.id === null;
            const url = isNew
                ? `http://localhost:8000/documents/${documentId}/fields`
                : `http://localhost:8000/documents/${documentId}/fields/${field.id}`;
            const response = await fetch(url, {
                method: isNew ? "POST" : "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ label, value }),
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.detail);
            return data;
        };

        // Click a cell (intitulé or valeur) to edit it in place; Entrée
        // saves, Échap or blur without change cancels back to plain text.
        // A never-saved row (field.id still null) with nothing typed is
        // removed instead of left as an empty row.
        const rendreEditable = (td, field, key) => {
            td.className = "editable";
            td.textContent = field[key] ?? "";

            const startEdit = () => {
                if (locked || td.querySelector("input")) return;

                const previous = field[key] ?? "";
                const input = document.createElement("input");
                input.type = "text";
                input.value = previous;
                td.textContent = "";
                td.appendChild(input);
                input.focus();

                const save = async () => {
                    const newValue = input.value;
                    if (newValue === previous) {
                        td.textContent = previous;
                        if (field.id === null && !field.label) td.closest("tr").remove();
                        return;
                    }
                    const label = key === "label" ? newValue : field.label;
                    const value = key === "value" ? newValue : field.value;
                    try {
                        const data = await enregistrerChamp(field, label, value);
                        field.id = data.id;
                        field.label = data.label;
                        field.value = data.value;
                        td.textContent = data[key] ?? "";
                    } catch (err) {
                        td.textContent = previous;
                        if (field.id === null) td.closest("tr").remove();
                        alert(err.message);
                    }
                };

                input.addEventListener("blur", save);
                input.addEventListener("keydown", (e) => {
                    if (e.key === "Enter") input.blur();
                    if (e.key === "Escape") {
                        input.removeEventListener("blur", save);
                        td.textContent = previous;
                        if (field.id === null && !field.label) td.closest("tr").remove();
                    }
                });
            };

            td.addEventListener("click", startEdit);
            return startEdit;
        };

        const ajouterLigneChamp = (field) => {
            const row = document.createElement("tr");
            const tdIntitule = document.createElement("td");
            const tdValeur = document.createElement("td");

            const startEditLabel = rendreEditable(tdIntitule, field, "label");
            rendreEditable(tdValeur, field, "value");

            row.append(tdIntitule, tdValeur);
            champsBody.appendChild(row);
            return startEditLabel;
        };

        ajouterChampBtn.addEventListener("click", () => {
            if (locked) return;
            const startEditLabel = ajouterLigneChamp({ id: null, label: "", value: null });
            startEditLabel();
        });

        // Raw columns from the `documents` table - no extracted fields yet.
        const LIBELLES = {
            name: "Nom de fichier",
            person: "Personne",
            company: "Entreprise",
            type: "Type",
            template: "Modèle",
            date: "Date",
        };

        fetch(`http://localhost:8000/documents/${documentId}`)
            .then(async (response) => {
                const data = await response.json();
                if (!response.ok) throw new Error(data.detail);
                return data;
            })
            .then((doc) => {
                graphiqueUrl = GRAPHIQUES[doc.template];
                if (!graphiqueUrl) {
                    vueToggle.disabled = true;
                    vueToggle.title = "Vue graphique non disponible pour ce modèle";
                }

                locked = doc.validated;
                valideToggle.checked = locked;
                appliquerVerrouillage();

                for (const [champ, libelle] of Object.entries(LIBELLES)) {
                    const row = document.createElement("tr");
                    row.innerHTML = `<th>${libelle}</th><td>${doc[champ]}</td>`;
                    table.appendChild(row);
                }

                // Extracted fields (document_field) - editable in place.
                for (const field of doc.fields) {
                    ajouterLigneChamp(field);
                }
            })
            .catch((err) => {
                table.outerHTML = `<p>${err.message}</p>`;
            });
    </script>
</body>

</html>
